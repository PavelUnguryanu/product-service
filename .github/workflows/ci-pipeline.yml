name: CI Pipeline for C# Application

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонирование репозитория
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Установка .NET SDK (для сборки)
      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.0.x' # Укажите версию .NET SDK

      # 3. Сборка проекта (проверка, что всё компилируется)
      - name: Restore dependencies and build project
        run: |
          dotnet restore
          dotnet build --configuration Release

      # 4. Сборка Docker-образа
      - name: Build Docker image
        run: |
          docker build -t your-dockerhub-username/product-service-csharp:latest .

      # 5. Логин в Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      # 6. Публикация Docker-образа в Docker Hub
      - name: Push Docker image to Docker Hub
        run: |
          docker push your-dockerhub-username/product-service-csharp:latest
